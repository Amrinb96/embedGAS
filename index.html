<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTP Site | PPD Beluran</title>
    <style>
        /* Tetapan asas */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background-color: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .sidebar a {
            padding: 15px 20px;
            color: #ecf0f1;
            text-decoration: none;
            border-bottom: 1px solid #34495e;
            transition: background 0.2s;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #34495e;
        }

        /* --- KAWASAN KANDUNGAN UTAMA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: #f8f9fa;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
            height: 50px;
            box-sizing: border-box;
        }

        /* --- BUTANG HAMBURGER & ANIMASI X --- */
        .hamburger-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: none;
            width: 26px;
            height: 20px;
            position: relative;
            margin-right: 15px;
            padding: 0;
            z-index: 1001;
        }

        .hamburger-btn .bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #333;
            border-radius: 3px;
            transition: all 0.3s ease-in-out;
        }

        .hamburger-btn .bar:nth-child(1) { top: 0; }
        .hamburger-btn .bar:nth-child(2) { top: 50%; transform: translateY(-50%); }
        .hamburger-btn .bar:nth-child(3) { bottom: 0; }

        .hamburger-btn.open .bar:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
        .hamburger-btn.open .bar:nth-child(2) { opacity: 0; }
        .hamburger-btn.open .bar:nth-child(3) { bottom: 50%; transform: translateY(50%) rotate(-45deg); }

        .topbar-title {
            font-weight: bold;
            color: #333;
        }

        /* --- IFRAME & LOADER CONTAINER --- */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #eaeded;
            position: relative; /* Penting untuk loader berada di dalam kawasan ini sahaja */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- CSS UNTUK SPINNING LOADER --- */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(234, 237, 237, 0.9); /* Latar belakang separa lutsinar */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50; /* Memastikan ia berada di atas iframe */
            transition: opacity 0.3s ease; /* Transisi lembut bila hilang */
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #bdc3c7; /* Warna bulatan asas */
            border-top: 5px solid #3498db; /* Warna garisan yang berpusing (Biru) */
            border-radius: 50%;
            animation: spin 1s linear infinite; /* Pusingan tanpa henti */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Kelas untuk menyembunyikan loader apabila siap */
        .hidden {
            opacity: 0;
            pointer-events: none; /* Memastikan klik menembusi ke iframe bila disembunyikan */
            visibility: hidden;
        }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .hamburger-btn { display: block; }
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Menu Sistem</div>
        <a class="nav-link active" data-url="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" data-title="Laman Utama">Laman Utama</a>
        <a class="nav-link" data-url="https://script.google.com/macros/s/AKfycbyyQytwWXbMmGb_oXXX5tKGVUUQwPJ1wdDPwZKRH5gO3ViRCMzgrwtZmKIfySrL7Hht/exec" data-title="Pelaporan dan Aktiviti">Pelaporan dan Aktiviti</a>
        <a class="nav-link" data-url="https://script.google.com/a/macros/moe.gov.my/s/AKfycbxFPjhGGE76uOLHQoDA_NcSTK5ncCODekEndJghI-Yc-zYz2VFYBmanC4rBErK1WnUA/exec" data-title="Dashboard STEM Beluran">Dashboard STEM Beluran</a>
    </div>

    <div class="main-content">
        <div class="topbar">
            <button class="hamburger-btn" id="hamburger-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <span class="topbar-title" id="topbar-title">Laman Utama</span>
        </div>

        <div class="iframe-container">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
            </div>
            
            <iframe id="main-iframe" src="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" title="Embedded Website"></iframe>
        </div>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const iframe = document.getElementById('main-iframe');
        const topbarTitle = document.getElementById('topbar-title');
        const menuLinks = document.querySelectorAll('.nav-link');
        const loader = document.getElementById('loader');

        // 1. Fungsi Tutup Loader apabila iframe selesai memuatkan laman web
        iframe.addEventListener('load', () => {
            loader.classList.add('hidden');
        });

        // 2. Fungsi Buka/Tutup Hamburger Menu & Animasi Butang
        hamburgerBtn.addEventListener('click', (event) => {
            sidebar.classList.toggle('show');
            hamburgerBtn.classList.toggle('open');
            event.stopPropagation();
        });

        // 3. Fungsi Tutup menu automatik bila klik luar sidebar (untuk mobile)
        window.addEventListener('click', (event) => {
            if (window.innerWidth <= 768) {
                if (sidebar.classList.contains('show') && !sidebar.contains(event.target)) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open');
                }
            }
        });

        // 4. Fungsi Navigasi Dinamik untuk Iframe
        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const newUrl = link.getAttribute('data-url');
                const newTitle = link.getAttribute('data-title');

                // Hanya paparkan loader dan tukar src jika URL berbeza dari yang sedia ada
                if (newUrl && iframe.src !== newUrl) {
                    loader.classList.remove('hidden'); // Paparkan semula loader
                    iframe.src = newUrl;
                }
                
                if (newTitle) topbarTitle.innerText = newTitle;

                menuLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Tutup sidebar secara automatik jika di mobile view
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open');
                }
            });
        });
    </script>

</body>
</html>
