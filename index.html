<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTP Site | PPD Beluran</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- TETAPAN ASAS --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #f8fafc; /* Warna latar belakang kelabu sangat lembut */
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 260px;
            background-color: #0f172a; /* Warna Slate 900 (Gelap Premium) */
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
        }

        .sidebar-header {
            padding: 24px 20px;
            text-align: center;
            background-color: #020617; /* Lebih gelap dari body sidebar */
            color: #ffffff;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1e293b;
        }

        .sidebar-menu {
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px; /* Jarak antara butang menu */
        }

        .sidebar a {
            padding: 14px 18px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 8px; /* Bucu bulat moden */
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .sidebar a:hover {
            background-color: #1e293b;
            color: #ffffff;
            transform: translateX(4px); /* Efek gerak sedikit ke kanan bila hover */
        }

        /* Menu Aktif */
        .sidebar a.active {
            background-color: #3b82f6; /* Warna biru moden */
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        /* --- KAWASAN KANDUNGAN UTAMA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px); /* Kesan kaca lutsinar sikit */
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 64px;
            box-sizing: border-box;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        /* --- BUTANG HAMBURGER & ANIMASI X --- */
        .hamburger-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: none;
            width: 24px;
            height: 18px;
            position: relative;
            margin-right: 20px;
            padding: 0;
            z-index: 1001;
        }

        .hamburger-btn .bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #0f172a;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hamburger-btn .bar:nth-child(1) { top: 0; }
        .hamburger-btn .bar:nth-child(2) { top: 50%; transform: translateY(-50%); }
        .hamburger-btn .bar:nth-child(3) { bottom: 0; }

        .hamburger-btn.open .bar:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
        .hamburger-btn.open .bar:nth-child(2) { opacity: 0; }
        .hamburger-btn.open .bar:nth-child(3) { bottom: 50%; transform: translateY(50%) rotate(-45deg); }

        .topbar-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 1.1rem;
        }

        /* --- IFRAME & LOADER CONTAINER --- */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #f1f5f9;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- CSS UNTUK SPINNING LOADER MODEN --- */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(248, 250, 252, 0.7); 
            backdrop-filter: blur(4px); /* Kesan blur pada background belakang loader */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6; /* Warna pusingan biru moden */
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .hamburger-btn { display: block; }
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .topbar-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Menu Sistem</div>
        <div class="sidebar-menu">
            <a class="nav-link active" data-url="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" data-title="Laman Utama">Laman Utama</a>
            <a class="nav-link" data-url="https://script.google.com/macros/s/AKfycbyyQytwWXbMmGb_oXXX5tKGVUUQwPJ1wdDPwZKRH5gO3ViRCMzgrwtZmKIfySrL7Hht/exec" data-title="Pelaporan dan Aktiviti">Pelaporan dan Aktiviti</a>
            <a class="nav-link" data-url="https://script.google.com/a/macros/moe.gov.my/s/AKfycbxFPjhGGE76uOLHQoDA_NcSTK5ncCODekEndJghI-Yc-zYz2VFYBmanC4rBErK1WnUA/exec" data-title="Dashboard STEM Beluran">Dashboard STEM Beluran</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <button class="hamburger-btn" id="hamburger-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <span class="topbar-title" id="topbar-title">Laman Utama</span>
        </div>

        <div class="iframe-container">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
            </div>
            
            <iframe id="main-iframe" src="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" title="Embedded Website"></iframe>
        </div>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const iframe = document.getElementById('main-iframe');
        const topbarTitle = document.getElementById('topbar-title');
        const menuLinks = document.querySelectorAll('.nav-link');
        const loader = document.getElementById('loader');

        // 1. Tutup Loader apabila iframe selesai
        iframe.addEventListener('load', () => {
            loader.classList.add('hidden');
        });

        // 2. Buka/Tutup Hamburger Menu
        hamburgerBtn.addEventListener('click', (event) => {
            sidebar.classList.toggle('show');
            hamburgerBtn.classList.toggle('open');
            event.stopPropagation();
        });

        // 3. Tutup menu bila klik luar sidebar (mobile)
        window.addEventListener('click', (event) => {
            if (window.innerWidth <= 768) {
                if (sidebar.classList.contains('show') && !sidebar.contains(event.target)) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open');
                }
            }
        });

        // 4. Navigasi Dinamik
        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const newUrl = link.getAttribute('data-url');
                const newTitle = link.getAttribute('data-title');

                if (newUrl && iframe.src !== newUrl) {
                    loader.classList.remove('hidden'); 
                    iframe.src = newUrl;
                }
                
                if (newTitle) topbarTitle.innerText = newTitle;

                menuLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open');
                }
            });
        });
    </script>

</body>
</html>
