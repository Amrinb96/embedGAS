<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTP Site | PPD Beluran</title>
    <style>
        /* Tetapan asas */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background-color: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .sidebar a {
            padding: 15px 20px;
            color: #ecf0f1;
            text-decoration: none;
            border-bottom: 1px solid #34495e;
            transition: background 0.2s;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #34495e;
        }

        /* --- KAWASAN KANDUNGAN UTAMA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: #f8f9fa;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
            height: 50px;
            box-sizing: border-box;
        }

        /* --- BUTANG HAMBURGER & ANIMASI X --- */
        .hamburger-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: none; /* Disembunyikan di desktop */
            width: 26px;
            height: 20px;
            position: relative;
            margin-right: 15px;
            padding: 0;
            z-index: 1001; /* Pastikan ia berada di atas elemen lain */
        }

        /* Tiga garisan hamburger */
        .hamburger-btn .bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #333;
            border-radius: 3px;
            transition: all 0.3s ease-in-out;
        }

        /* Kedudukan asal setiap garisan */
        .hamburger-btn .bar:nth-child(1) { top: 0; }
        .hamburger-btn .bar:nth-child(2) { top: 50%; transform: translateY(-50%); }
        .hamburger-btn .bar:nth-child(3) { bottom: 0; }

        /* Keadaan apabila butang ditekan (Class 'open' ditambah oleh JS) */
        .hamburger-btn.open .bar:nth-child(1) {
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }
        .hamburger-btn.open .bar:nth-child(2) {
            opacity: 0; /* Garisan tengah hilang */
        }
        .hamburger-btn.open .bar:nth-child(3) {
            bottom: 50%;
            transform: translateY(50%) rotate(-45deg);
        }

        .topbar-title {
            font-weight: bold;
            color: #333;
        }

        /* --- IFRAME --- */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #eaeded;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .hamburger-btn {
                display: block;
            }
            
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%); 
            }

            .sidebar.show {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Menu Sistem</div>
        <a class="nav-link active" data-url="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" data-title="Laman Utama">Laman Utama</a>
        <a class="nav-link active" data-url="https://script.google.com/macros/s/AKfycbyyQytwWXbMmGb_oXXX5tKGVUUQwPJ1wdDPwZKRH5gO3ViRCMzgrwtZmKIfySrL7Hht/exec" data-title="Pelaporan dan Aktiviti">Pelaporan dan Aktiviti</a>
        <a class="nav-link" data-url="https://script.google.com/a/macros/moe.gov.my/s/AKfycbxFPjhGGE76uOLHQoDA_NcSTK5ncCODekEndJghI-Yc-zYz2VFYBmanC4rBErK1WnUA/exec" data-title="Dashboard STEM Beluran">Dashboard STEM Beluran</a>
    </div>

    <div class="main-content">
        <div class="topbar">
            <button class="hamburger-btn" id="hamburger-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <span class="topbar-title" id="topbar-title">Laman Utama</span>
        </div>

        <div class="iframe-container">
            <iframe id="main-iframe" src="https://script.google.com/a/macros/moe.gov.my/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" title="Embedded Website"></iframe>
        </div>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const iframe = document.getElementById('main-iframe');
        const topbarTitle = document.getElementById('topbar-title');
        const menuLinks = document.querySelectorAll('.nav-link');

        // 1. Fungsi Buka/Tutup Hamburger Menu & Animasi Butang
        hamburgerBtn.addEventListener('click', (event) => {
            sidebar.classList.toggle('show');
            hamburgerBtn.classList.toggle('open'); // Tukar kepada X atau sebaliknya
            event.stopPropagation();
        });

        // 2. Fungsi Tutup menu automatik bila klik luar sidebar (untuk mobile)
        window.addEventListener('click', (event) => {
            if (window.innerWidth <= 768) {
                if (sidebar.classList.contains('show') && !sidebar.contains(event.target)) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open'); // Kembalikan X kepada hamburger
                }
            }
        });

        // 3. Fungsi Navigasi Dinamik untuk Iframe
        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const newUrl = link.getAttribute('data-url');
                const newTitle = link.getAttribute('data-title');

                if (newUrl) iframe.src = newUrl;
                if (newTitle) topbarTitle.innerText = newTitle;

                menuLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Tutup sidebar secara automatik jika di mobile view
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                    hamburgerBtn.classList.remove('open'); // Kembalikan X kepada hamburger
                }
            });
        });
    </script>

</body>
</html>
