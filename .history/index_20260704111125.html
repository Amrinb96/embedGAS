<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTP Site | PPD Beluran</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- TETAPAN ASAS --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #f8fafc;
        }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            width: 260px;
            background-color: #0f172a;
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between; /* Asingkan teks kiri dan butang kanan */
            align-items: center;
            background-color: #020617;
            border-bottom: 1px solid #1e293b;
        }

        .sidebar-title {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        /* Butang Tutup (X) dalam Sidebar */
        .close-sidebar-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: none; /* Sembunyi di desktop */
            transition: all 0.2s ease;
        }

        .close-sidebar-btn:hover {
            background-color: #1e293b;
            color: #ef4444; /* Warna merah lembut bila hover */
        }

        .sidebar-menu {
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sidebar a {
            padding: 14px 18px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .sidebar a:hover {
            background-color: #1e293b;
            color: #ffffff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        /* --- KAWASAN KANDUNGAN UTAMA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- TOP BAR --- */
        .topbar {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 64px;
            box-sizing: border-box;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        /* --- BUTANG HAMBURGER BARU --- */
        .hamburger-btn {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Sembunyi di desktop */
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            margin-right: 16px;
            padding: 0;
            transition: all 0.2s ease;
        }

        .hamburger-btn:hover {
            background-color: #e2e8f0;
        }

        .topbar-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 1.1rem;
        }

        /* --- IFRAME & LOADER CONTAINER --- */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #f1f5f9;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- CSS UNTUK SPINNING LOADER --- */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(248, 250, 252, 0.7); 
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .hamburger-btn { display: flex; } /* Munculkan butang hamburger */
            .close-sidebar-btn { display: flex; align-items: center; justify-content: center; } /* Munculkan butang X */
            
            .sidebar { 
                position: absolute; 
                height: 100%; 
                transform: translateX(-100%);
                box-shadow: none;
            }
            .sidebar.show { 
                transform: translateX(0); 
                box-shadow: 10px 0 25px rgba(0,0,0,0.5); /* Bayang lebih gelap bila sidebar terbuka */
            }
            .topbar-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <span class="sidebar-title">Menu Sistem</span>
            <button class="close-sidebar-btn" id="close-sidebar-btn" aria-label="Tutup Menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="sidebar-menu">
            <a class="nav-link active" data-url="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" data-title="Laman Utama">Laman Utama</a>
            <a class="nav-link" data-url="https://script.google.com/macros/s/AKfycby-0HdUIyTFsaWK7jyhT4H55JXHLZ8sRGKR9aFxIt-HjiVO3yCtn6Xa6-pdiySWzq9U/exec" data-title="Pelaporan dan Aktiviti">Pelaporan dan Aktiviti</a>
            <a class="nav-link" data-url="https://script.google.com/a/macros/moe.gov.my/s/AKfycbxFPjhGGE76uOLHQoDA_NcSTK5ncCODekEndJghI-Yc-zYz2VFYBmanC4rBErK1WnUA/exec" data-title="Dashboard STEM Beluran">Dashboard STEM Beluran</a>
        </div>

    </div>

    <div class="main-content">

        <div class="topbar">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Buka Menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <span class="topbar-title" id="topbar-title">Laman Utama</span>
        </div>

        <div class="iframe-container">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
            </div>
            
            <iframe id="main-iframe" src="https://script.google.com/macros/s/AKfycbzoy7ayiozPs_rhX8XeV_6P5ciRGJOa4KO4hgYxwu6f5FwikEUYoYXx2uZzgGGRly3ROg/exec" title="Embedded Website"></iframe>
        </div>
        
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const iframe = document.getElementById('main-iframe');
        const topbarTitle = document.getElementById('topbar-title');
        const menuLinks = document.querySelectorAll('.nav-link');
        const loader = document.getElementById('loader');

        // 1. Tutup Loader apabila iframe selesai dimuatkan
        iframe.addEventListener('load', () => {
            loader.classList.add('hidden');
        });

        // 2. Buka Sidebar (Klik pada Hamburger)
        hamburgerBtn.addEventListener('click', (event) => {
            sidebar.classList.add('show');
            event.stopPropagation();
        });

        // 3. Tutup Sidebar (Klik pada butang X di dalam menu)
        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('show');
        });

        // 4. Tutup menu automatik bila klik luar sidebar
        window.addEventListener('click', (event) => {
            if (window.innerWidth <= 768) {
                if (sidebar.classList.contains('show') && !sidebar.contains(event.target)) {
                    sidebar.classList.remove('show');
                }
            }
        });

        // 5. Navigasi Dinamik (Tukar pautan dan paparan tajuk)
        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                const newUrl = link.getAttribute('data-url');
                const newTitle = link.getAttribute('data-title');

                if (newUrl && iframe.src !== newUrl) {
                    loader.classList.remove('hidden'); 
                    iframe.src = newUrl;
                }
                
                if (newTitle) topbarTitle.innerText = newTitle;

                menuLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Auto-tutup sidebar selepas menu ditekan
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('show');
                }
            });
        });
    </script>

</body>
</html>
